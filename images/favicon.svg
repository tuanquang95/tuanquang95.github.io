<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="92" ry="92"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="92" ry="92" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines in background -->
  <g opacity="0.06" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- ── NEURAL NETWORK ── -->
  <!-- Node positions:
       Layer 0 (input):  x=102  y=102, 256, 410
       Layer 1 (hidden): x=256  y=102, 256, 410
       Layer 2 (output): x=410  y=179, 333
  -->

  <!-- Edges — dim base -->
  <g stroke="#4f46e5" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round">
    <!-- L0→L1 -->
    <line x1="102" y1="102" x2="256" y2="102"/>
    <line x1="102" y1="102" x2="256" y2="256"/>
    <line x1="102" y1="102" x2="256" y2="410"/>
    <line x1="102" y1="256" x2="256" y2="102"/>
    <line x1="102" y1="256" x2="256" y2="256"/>
    <line x1="102" y1="256" x2="256" y2="410"/>
    <line x1="102" y1="410" x2="256" y2="102"/>
    <line x1="102" y1="410" x2="256" y2="256"/>
    <line x1="102" y1="410" x2="256" y2="410"/>
    <!-- L1→L2 -->
    <line x1="256" y1="102" x2="410" y2="179"/>
    <line x1="256" y1="102" x2="410" y2="333"/>
    <line x1="256" y1="410" x2="410" y2="179"/>
    <line x1="256" y1="410" x2="410" y2="333"/>
  </g>

  <!-- Highlighted edges — active path -->
  <g stroke="#818cf8" stroke-opacity="0.9" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)">
    <line x1="102" y1="256" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="410" y2="179"/>
    <line x1="256" y1="256" x2="410" y2="333"/>
  </g>

  <!-- Glow halos on nodes -->
  <g opacity="0.35">
    <!-- Input layer -->
    <circle cx="102" cy="102" r="28" fill="url(#nodeGlow)"/>
    <circle cx="102" cy="256" r="28" fill="url(#nodeGlow)"/>
    <circle cx="102" cy="410" r="28" fill="url(#nodeGlow)"/>
    <!-- Hidden layer -->
    <circle cx="256" cy="102" r="28" fill="url(#nodeGlow)"/>
    <circle cx="256" cy="256" r="44" fill="url(#centerGlow)"/>
    <circle cx="256" cy="410" r="28" fill="url(#nodeGlow)"/>
    <!-- Output layer -->
    <circle cx="410" cy="179" r="28" fill="url(#nodeGlow)"/>
    <circle cx="410" cy="333" r="28" fill="url(#nodeGlow)"/>
  </g>

  <!-- Input layer nodes -->
  <g filter="url(#glow)">
    <circle cx="102" cy="102" r="16" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
    <circle cx="102" cy="256" r="16" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
    <circle cx="102" cy="410" r="16" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
  </g>

  <!-- Hidden layer nodes -->
  <g filter="url(#glow)">
    <circle cx="256" cy="102" r="16" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
    <!-- Centre node — brighter accent -->
    <circle cx="256" cy="256" r="26" fill="#6366f1" stroke="#a78bfa" stroke-width="3"/>
    <circle cx="256" cy="256" r="14" fill="#c4b5fd"/>
    <circle cx="256" cy="410" r="16" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
  </g>

  <!-- Output layer nodes -->
  <g filter="url(#glow)">
    <circle cx="410" cy="179" r="16" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
    <circle cx="410" cy="333" r="16" fill="#a5b4fc" stroke="#6366f1" stroke-width="2"/>
  </g>

  <!-- ── "J" Initial ── -->
  <text
    x="334"
    y="470"
    font-family="'DejaVu Sans', 'Arial', sans-serif"
    font-weight="700"
    font-size="112"
    fill="#a5b4fc"
    fill-opacity="0.88"
    filter="url(#softGlow)"
  >J</text>
</svg>
